name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "platforms;android-35" "build-tools;34.0.0" "build-tools;35.0.0"
      - name: Verify sample workspace
        run: ./gradlew :libs:graph:allTests :libs:graph:assembleDebug :libs:graph:compileKotlinIosSimulatorArm64 :libs:resource:loader:compileDebugKotlinAndroid :libs:resource:loader:compileKotlinIosSimulatorArm64 :libs:resource:loader-engine-coil:compileDebugKotlinAndroid :libs:resource:loader-engine-coil:compileKotlinIosSimulatorArm64 :libs:resource:loader-engine-glide:compileDebugKotlinAndroid :libs:resource:runtime:compileDebugKotlinAndroid :libs:resource:runtime:compileKotlinIosSimulatorArm64 :libs:image:image:allTests :libs:image:image:compileKotlinIosSimulatorArm64 :libs:image:engine-coil:allTests :libs:image:engine-coil:compileKotlinIosSimulatorArm64 :libs:image:engine-glide:compileDebugKotlinAndroid :libs:svga:allTests :libs:svga:compileDebugKotlinAndroid :libs:svga:compileKotlinIosSimulatorArm64 :apps:cmp:compileDebugKotlinAndroid :apps:cmp:compileKotlinIosSimulatorArm64 :apps:android:compileDebugKotlin :benchmark:compileBenchmarkKotlin && ./gradlew -p plugins :resource-gradle-plugin:test
